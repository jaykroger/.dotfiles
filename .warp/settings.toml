[appearance]

[appearance.text]
ai_font_name = "JetBrainsMono Nerd Font"
match_ai_font = false
font_size = 13.0
font_name = "JetBrainsMono Nerd Font Mono"
notebook_font_size = 14.0

[appearance.window]
zoom_level = 110
override_opacity = 40
override_blur = 50

[appearance.vertical_tabs]
enabled = true

[appearance.themes]
system_theme = false
theme = { custom = { name = "_next", path = "_next.yaml" } }

[agents]
cloud_conversation_storage_enabled = true

[agents.warp_agent]

[agents.warp_agent.input]
nld_in_terminal_enabled = true

[terminal]

[terminal.input]
honor_ps1 = true
error_underlining_enabled = false
completions_open_while_typing = true
input_box_type_setting = "classic"

[notifications]

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 60
mode = "enabled"
play_notification_sound = true

[privacy]
telemetry_enabled = true
crash_reporting_enabled = true

[account]
is_settings_sync_enabled = true

[general]
default_session_mode = "agent"

[text_editing]
vim_mode_enabled = false