# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = true

## Shell Prompt Format
##############################

# format = """[в•ӯв•ҙ](238) $os $all\
# [в•°в”Җ](238)$character"""

format = "$all"

## OS and Shell Settings
########################

# Prompt characters
[character]
success_symbol = "[пҒ”](238)"
error_symbol = "[пҒ”](238)"
disabled = true

# OS symbol
[os]
format = "[$symbol](bold white) "
disabled = true

[os.symbols]
Amazon = "пү°"
Kali = "пҢ§"
Macos = "пҢӮ"
Raspbian = "пҢ•"
Redhat = "пҢ–"
RedHatEnterprise = "пҢ–"
Ubuntu = "пҢӣ"
Unknown = "пҲӯ"
Windows = "у°ҚІ"

# Username
[username]
style_user = "white"
style_root = "black"
format = "[@$user]($style) "
show_always = true
disabled = false

# Hostname
[hostname]
ssh_only = false
format = "[$hostname](yellow) "
disabled = true

# Directory
[directory]
truncation_length = 5
truncation_symbol = "вҖҰ/"
home_symbol = "~"
read_only_style = "white"
read_only = "у°үҗ"
format = "[$path]($style)[$read_only]($read_only_style) "
style = "yellow"

## App & Language-Specific Settings
###################################

[aws]
symbol = "оһӯ"
format =" [$symbol $region]($style) [$profile у°ҚӮ $duration](white) "
style = "white"
disabled = false

[azure]
symbol = "оҜҳ"
format = " [$symbol $subscription]($style) "
style = "white"
disabled = false

[docker_context]
symbol = "пҢҲ"
format = " [$symbol $context ]($style) "
style = "white"
disabled = false

[git_branch]
symbol = "пҗҳ"
format = " [$symbol $branch]($style) "
truncation_length = 4
truncation_symbol = "вҖҰ/"
style = "white"
disabled = false

[git_commit]
tag_symbol = ' пҗ’ '
disabled = false

[git_status]
format = ' [\($all_status$ahead_behind\)]($style) '

conflicted = "рҹҸі"
up_to_date = "пҒҶ"
untracked = "п”©"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
stashed = "пЈ–"
modified = "пҒ„"
staged = '[++\($count\)](green)'
renamed = "пӘ¶"
deleted = "пҖ”"
style = "white"
disabled = true

[golang]
symbol = "оҷһ"
format = " [$symbol $version]($style) "
disabled = false

[helm]
symbol = "оҹ»"
format = " [$symbol $version]($style) "
style = "white"
disabled = false

[kubernetes]
symbol = "уұғҫ"
format = ' [$symbol $cluster \($namespace\)]($style) '
style = "white"
disabled = false

[nodejs]
symbol = "оһҒ"
format = " [$symbol $version]($style) "
style = "white"
disabled = false

[package]
symbol = "у°Ҹ“"
format = " [$symbol $version]($style) "
style = "white"
disabled = false

[python]
symbol = "оҳҶ"
format = " [$symbol $version]($style) "
style = "white"
disabled = false

[swift]
symbol = "оқ•"
format = " [$symbol $version]($style) "
style = "white"
disabled = false

[terraform]
symbol = "оҡҡ"
format = " [$symbol terraform $version]($style) "
disabled = false
style    = "white"